<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Areca Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a4d2e;
            --primary-light: #2d6a4f;
            --accent: #d4a574;
            --text-dark: #1e1e1e;
            --text-light: #666;
            --background: #fefefe;
            --background-subtle: #f8f7f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            color: var(--text-dark);
            background: var(--background);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(254, 254, 254, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            width: 180px;
            height: 50px;
            background: var(--background-subtle);
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--text-light);
            border-radius: 4px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a:hover:after {
            width: 100%;
        }

        /* Contact Section */
        .contact-section {
            min-height: calc(100vh - 80px);
            margin-top: 80px;
            display: flex;
            align-items: center;
            padding: 6rem 5%;
        }

        .contact-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .contact-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--text-dark);
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .contact-content p {
            font-size: 1.15rem;
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .contact-image {
            width: 100%;
            aspect-ratio: 4/3;
            background: var(--background-subtle);
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .contact-image:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(26, 77, 46, 0.08) 0%, 
                rgba(212, 165, 116, 0.12) 100%);
        }

        .contact-image span {
            position: relative;
            z-index: 1;
        }

        /* Footer */
        footer {
            background: var(--text-dark);
            color: white;
            padding: 3rem 5%;
            text-align: center;
        }

        footer p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        @media (max-width: 968px) {
            .contact-container {
                grid-template-columns: 1fr;
                gap: 3rem;
            }

            .contact-content h1 {
                font-size: 2.5rem;
            }

            .contact-image {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container">
            [LOGO PLACEHOLDER]
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-content">
                <h1>Contact Us</h1>
                <p>
                    If you'd like to learn more about our work, please reach out. 
                    We look forward to connecting with you.
                </p>
            </div>
            <div class="contact-image">
                <span>[IMAGE PLACEHOLDER]</span>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Areca Bio. All rights reserved.</p>
    </footer>
</body>
</html>
