<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Areca Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="areca_favicon.png" type="image/png">

</head>
<body>
    <nav>
        <div class="logo-container">
            <a href="/"><img src="img/areca_logo.svg" alt="Areca Bio"/></a>
        </div>
        <ul class="nav-links">
            <!--<li><a href="/">Home</a></li>-->
            <!--<li><a href="about.html">About Us</a></li>-->
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-content">
                <h1>Contact Us</h1>
                <p>
                    If you'd like to learn more about our work, please reach out. 
                    We look forward to connecting with you.
                </p>

                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <button type="submit" class="submit-button" id="submitButton">Send Message</button>
                    
                    <div class="form-message" id="formMessage"></div>
                </form>
            </div>
            <div class="contact-image">
                <a href="/"><img src="img/cancer_cells_purple.jpg" style="width: 800px; height: auto;" alt="Contact Us"/></a>

            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Areca Bio. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitButton = document.getElementById('submitButton');
            const formMessage = document.getElementById('formMessage');
            
            // Disable submit button
            submitButton.disabled = true;
            submitButton.textContent = 'Sending...';
            
            // Hide any previous messages
            formMessage.style.display = 'none';
            
            // Get form data
            const formData = new FormData(this);
            
            try {
                // Send data to Formspree
                // IMPORTANT: Replace YOUR_FORM_ID with your actual Formspree form ID
                // Get your form ID at https://formspree.io/
                const response = await fetch('https://formspree.io/f/mykdlpww', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // Show success message
                    formMessage.textContent = 'Thank you for your message! We will get back to you soon.';
                    formMessage.className = 'form-message success';
                    formMessage.style.display = 'block';
                    
                    // Reset form
                    document.getElementById('contactForm').reset();
                } else {
                    // Show error message
                    const data = await response.json();
                    if (data.errors) {
                        formMessage.textContent = data.errors.map(error => error.message).join(', ');
                    } else {
                        formMessage.textContent = 'There was an error sending your message. Please try again.';
                    }
                    formMessage.className = 'form-message error';
                    formMessage.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Error:', error);
                // Show error message
                formMessage.textContent = 'There was an error connecting to the server. Please try again later or email us directly at tsears@ucsd.edu';
                formMessage.className = 'form-message error';
                formMessage.style.display = 'block';
            } finally {
                // Re-enable submit button
                submitButton.disabled = false;
                submitButton.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
